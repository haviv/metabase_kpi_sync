<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Smoke test</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0f1115; --panel:#161a22; --ink:#e7ecf3; --muted:#9aa5b5;
    --accent:#6aa9ff; --bad:#ff6b6b; --ok:#53c18d; --warn:#f0b429;
    --border:#232a36; }
  html,body { background:var(--bg); color:var(--ink); margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:1200px; margin:0 auto; padding:24px; }
  h1 { font-size:22px; margin:0 0 4px; }
  h2 { font-size:15px; margin:28px 0 10px; color:var(--muted);
    text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:18px; }
  .grid { display:grid; gap:16px; }
  .k4 { grid-template-columns:repeat(4,1fr); }
  .card { background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:18px 20px; }
  .metric { font-size:34px; font-weight:700; line-height:1.1; }
  .metric small { display:block; color:var(--muted); font-weight:400;
    font-size:12px; margin-top:6px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:6px 10px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-size:11px; text-transform:uppercase;
    letter-spacing:.06em; font-weight:600; }
  td.n,th.n { text-align:right; font-variant-numeric:tabular-nums; }
  tr:hover td { background:#1c2230; }
  code { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:12px;
    background:#1c2230; padding:1px 6px; border-radius:4px; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  p { line-height:1.5; }
</style>
</head>
<body><div class="wrap">
<h1>Smoke test</h1>
<div class="sub"><p>generated by smoke test</p></div>
<div class='card'><div class='metric'>674<small>Internal bugs last 30d</small></div></div>
<h2>By state</h2>
<div class='card'><canvas id='chart_1' height='220'></canvas></div>
<h2>Top assignees</h2>
<div class='card'><table><thead><tr><th>assigned_to</th><th>n</th></tr></thead><tbody><tr><td>Amir Fransis</td><td>44</td></tr><tr><td>Mahesh Gutal</td><td>32</td></tr><tr><td>Tomer Ansher</td><td>31</td></tr><tr><td>Barak Zabari</td><td>20</td></tr><tr><td>Manoj Kumar Dwivedi</td><td>19</td></tr></tbody></table></div>
</div>
<script>
Chart.defaults.color = "#9aa5b5"; Chart.defaults.borderColor = "#232a36";
new Chart(document.getElementById('chart_1'), {type:'bar', data:{labels:["QA Completed", "Removed", "New", "Done", "Ready for QA", "Approved", "Waiting for PR", "In Progress", "Not reproduced", "ON-HOLD"],datasets:[{label:"n",data:[251, 159, 109, 87, 67, 35, 29, 27, 26, 26], backgroundColor:'#6aa9ff',borderColor:'#6aa9ff', tension:.25}]},options:{scales:{x:{stacked:false},y:{stacked:false}}}});
</script>
</body></html>
